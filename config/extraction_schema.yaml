# Extraction schema. The extractor pulls a list of issue objects from each
# review using ONLY these fields. The prompt does not name specific complaints,
# features, bugs, or product areas - real problems must surface from reviewer
# language, not from anything the prompt suggests.
#
# If you find yourself wanting to add "watch for X" to this file, don't. Add a
# new eval case to evals/ instead, and let the open extraction find it.

fields:
  theme:
    type: string
    description: Short noun phrase naming the concern. Lowercase, no trailing punctuation.
  severity:
    type: enum
    values: [low, medium, high]
    description: high = blocks core use or risks user leaving. medium = repeated friction. low = minor annoyance.
  sentiment:
    type: enum
    values: [positive, neutral, negative]
    description: Reviewer affect toward the theme.
  feature_area:
    type: enum
    values: [core_listening, discovery, social, monetization, account, stability, downloads, other]
    description: |
      Surface of the product. Use "other" rather than forcing a fit.
      - stability: app crashes, freezes, force-closes, ANRs, hangs, overheating, or battery drain.
      - downloads: offline playback, downloaded-track playback, download failures, files disappearing, or offline-mode issues.
  segment_hint:
    type: string
    description: Free text. Empty unless the review implies a segment (e.g. "creator", "free-tier", "long-time user"). Do not infer from rating.

extraction:
  max_issues_per_review: 4
  allow_empty: true   # If a review has no extractable issues, return [].
